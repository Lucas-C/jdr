- nom: Le dernier café sur la gauche
  joueurs: 3 à 5 joueur·euses
  duree: 1h environ
  specificites: axé sur le <em>roleplay</em>, sans MJ, sans dés, narration collective, règles à lire au fur et à mesure
  description: |
    <blockquote>
      Nous sommes au milieu d’un pet bourg désert indéterminé, un mardi pluvieux
      de novembre, tôt dans la soirée. Vous savez le moment où tous les magasins ont
      fermé, et les quelques rares personnes encore présentes terminent leur boulot ou
      leurs courses en vitesse. Une seule vitrine reste allumée, le dernier café sur la
      gauche. A l’intérieur, sous le regard fagué et apathique d’un barman qui vient de
      travailler dix heures d’affilé, sont assis une poignée de personnes, seuls à leur table.
      <br><br>
      Qui sont-ils ?
    </blockquote>
  documents:
  - "Règle du jeu : une feuille recto-verso"
  images:
  - LeDernierCafeSurLaGauche.jpg
  url: https://chezsoi.org/s/LDCSLGPDFDownload

- nom: Tout le monde est <s>John</s> Jean
  joueurs: 1 MJ + 2 à 5 joueur·euses
  duree: 1h à 2h
  specificites: "à tour de rôle, sans scénario fourni : improvisation nécessaire, minimaliste, peu d'explications fournies : à vous d'improviser !"
  description: |
    <blockquote>
      <s>John</s> Jean est possédé par des esprits maléfiques : VOUS !
      <br>
      Incarnez des âmes errantes / démons / spectres possesseurs
      et luttez pour prendre le contrôle du corps de <s>John</s> Jean.
    </blockquote>
    <em>Tout le monde est John</em> est court jeu de rôle indé datant des années 2000.
    <br>
    Cette version traduite récemment en français évite l'aspect psychophobiquee des règles originales
    en faisant plutôt incarner aux joueur·euses des esprits luttant pour prendre possession de <s>John</s> Jean.
  materiel:
  - Un dé à 6 faces
  - Une feuille d'esprit pour chaque joueur·euse
  documents:
  - "Règle du jeu : 3 pages"
  images:
  - TLMEJ.png
  url: https://www.reddit.com/r/jdr/comments/1kcvjtl/tous_le_monde_est_jean_traduction_fr_de_everyone/

- nom: Big Gay Orcs
