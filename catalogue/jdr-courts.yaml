- nom: Jeux <em>For The Story</em>
  joueurs: 2 à 5 joueur·euses
  duree: 1h à 2h
  specificites: sans MJ, sans dés, à tour de rôle, narration collective, facile à jouer
  description: |
    Inventez ensemble des histoires épiques, drôles, dramatiques, riches en émotions, rencontres et lieux inattendus.
    <br>
    Quatre jeux <em>For The Story</em> sont disponibles :
    <blockquote>
      <b>Sur la Route</b> est le dernier publié, et le plus riche.
      Quel est le but de votre voyage ? Pour quelles raisons avez-vous pris la route ? Quel drama révélerez-vous en chemin ?
      Choisissez l’un des 48 thèmes proposés, puis laissez-vous guider des préparatifs du voyage jusqu’à sa conclusion.
    </blockquote>
    <blockquote>
      <b>Pour la Reine</b> est l'excellent jeu qui a lancé la collection.
      Racontez un récit mêlant amour, héroïsme, doutes et trahisons, jusqu’à l’apparition de la plus importante des questions :
      La Reine est attaquée. La défendez-vous ?
    </blockquote>
    <blockquote>
      <b>Donjons et siphons</b> :
      L’entretien des W.C. et des canalisations d’un donjon est un travail difficile,
      rempli d’épreuves, et il est temps que le Seigneur du Donjon vous prenne en considération.
      Qui parmi vous montrera qu’il a toutes les qualités (et une bonne dose de folie) pour vous représenter ?
    </blockquote>
    <blockquote>
      <b>Rituels</b> :
      Entrez dans un monde de cultes secrets et de rituels mystiques : choisissez l’un des 8 contextes
      et l’un des 8 rituels à accomplir, et laissez-vous guider en répondant aux questions des cartes.
      Inventez ensemble un récit mêlant mysticisme, doutes et complots.
    </blockquote>
  materiel:
  - La boîte du jeu et ses cartes
  images:
  - Sur_La_Route.png
  - PourLaReine.png
  url: https://forthestory.fr/jeux/

- nom: Run. Die. Repeat.
  joueurs: 1 MJ + 1 à 6 joueur·euses
  duree: 20 à 30min en général
  specificites: temps limité, à tour de rôle
  description: |
    <blockquote>
      Vous êtes piégé dans une <b>boucle temporelle</b> !
      <br>
      Chaque fois que vous mourrez, vous recommencez exactement au même endroit, au même instant.
      <br>
      Trouverez-vous comment vous échapper ?
    </blockquote>
    Un jeu conçu pour de courtes sessions effrénées,
    stimulant l'imagination et l'improvisation des joueur·euses qui jouent à tour de rôle.
  materiel:
  - Un dé à 6 faces
  - Un minuteur, par exemple sur smartphone
  documents:
  - "Règle du jeu : une page"
  - "Chaque partie peut être intégralement improvisée, mais quelques scénarios sont aussi proposés : une feuille pour chaque"
  images:
  - RunDieRepeat-with-goblin.jpg
  - RunDieRepeat-Labyrinthe.png
  - RunDieRepeat-Invasion.jpg
  url: https://lucas-c.itch.io/10-scenarios-pour-run-die-repeat

